# Render Blueprint — deploys the backend (Docker web service) and the frontend
# (static React build) together. In the Render dashboard, connect this repo and
# apply the blueprint; both services deploy automatically.
services:
  # Backend API — FastAPI running in a Docker container.
  - type: web
    name: gym-reporter-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true

  # Frontend — static React build served by Render's CDN.
  - type: web
    name: gym-reporter-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Point the built frontend at the deployed backend's hostname.
      - key: VITE_API_URL
        fromService:
          type: web
          name: gym-reporter-api
          property: host
    routes:
      # Single-page app: send all unknown paths to index.html.
      - type: rewrite
        source: /*
        destination: /index.html
