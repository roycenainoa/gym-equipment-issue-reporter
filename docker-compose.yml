# Orchestrates the two services (frontend + backend) for one-command local startup
# and as the deployable unit required by the assignment.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database on the host so data survives container restarts.
      - backend-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Browser runs on the host, so it reaches the backend via the published port.
        VITE_API_URL: http://localhost:8000
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  backend-data:
